<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Auto News Bot</title>
</head>
<body>
  <h1>Auto News Bot is Running</h1>
  <p>Fetching and sending new articles every 60 seconds...</p>

  <script>
    const botToken = '7519600894:AAHSl5O6MsLh4sVyDPX0tLRRXkIAGabXPTY'; // replace safely
    const channelUsername = '@sskylline'; // replace with your channel username
    const proxy = 'https://api.allorigins.win/get?url=';

    // Reduced set of feeds for testing (avoid 50+ at once)
    const rssFeeds = [
      'https://www.akhbarak.net/rss/arabic-news',
      'https://www.alriyadh.com/rss',
      'https://www.aljazeera.net/aljazeera/rss/all.xml'
    ];

    const sentLinks = new Set();

    async function fetchFeed(feedUrl) {
      try {
        const response = await fetch(proxy + encodeURIComponent(feedUrl));
        if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
        const data = await response.json();
        if (!data.contents) throw new Error('No contents in proxy response');

        const xml = new DOMParser().parseFromString(data.contents, 'text/xml');
        return Array.from(xml.querySelectorAll('item')).map(item => ({
          title: item.querySelector('title')?.textContent || 'No title',
          link: item.querySelector('link')?.textContent || ''
        }));
      } catch (error) {
        console.error(`Error fetching feed ${feedUrl}:`, error.message);
        return [];
      }
    }

    async function sendToTelegram(title, link) {
      if (!link) return;
      const message = `📰 <b>${title}</b>\n<a href="${link}">Read more</a>`;
      const apiURL = `https://api.telegram.org/bot${botToken}/sendMessage`;
      try {
        const res = await fetch(apiURL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: channelUsername,
            text: message,
            parse_mode: 'HTML',
            disable_web_page_preview: false
          })
        });
        if (!res.ok) {
          const err = await res.json();
          console.error('Telegram API error:', err);
        }
      } catch (err) {
        console.error('Error sending message to Telegram:', err.message);
      }
    }

    async function fetchAndSendNews() {
      for (const feed of rssFeeds) {
        const items = await fetchFeed(feed);
        for (const item of items.slice(0, 2)) { // send max 2 items per feed
          if (item.link && !sentLinks.has(item.link)) {
            await sendToTelegram(item.title, item.link);
            sentLinks.add(item.link);
            // slight delay between sends to avoid Telegram flood limits
            await new Promise(r => setTimeout(r, 500));
          }
        }
      }
    }

    // Run immediately and then every 60 seconds
    fetchAndSendNews();
    setInterval(fetchAndSendNews, 60000);
  </script>
</body>
</html>
