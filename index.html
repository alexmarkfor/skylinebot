<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Market — Mobile iOS Style</title>
  <style>
    :root {
      --bg: #061021;
      --panel: #07172a;
      --accent: #0a6cff;
      --muted: #93a4bf;
      --radius: 20px;
      --bold: 800;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      background: var(--panel);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      z-index: 10;
    }
    header h1 {
      font-size: 18px;
      font-weight: var(--bold);
      margin: 0;
    }
    .searchbar {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      margin: 12px;
      display: flex;
      align-items: center;
    }
    .searchbar input {
      flex: 1;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
      outline: none;
      padding-left: 8px;
    }
    main {
      padding: 0 12px 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }
    .card-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title {
      font-weight: var(--bold);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
    }
    .card-price {
      font-weight: var(--bold);
      color: var(--accent);
      margin-top: 6px;
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--panel);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer button {
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: var(--bold);
    }
  </style>
</head>
<body>
  <header>
    <h1>Market</h1>
    <button>Cart</button>
  </header>
  <div class="searchbar">
    <input type="text" id="search" placeholder="Search products...">
  </div>
  <main>
    <div class="grid" id="productGrid"></div>
  </main>
  <footer>
    <button>Home</button>
    <button>Categories</button>
    <button>Profile</button>
  </footer>

  <script>
    async function loadProducts(){
      const res = await fetch('data.json');
      const products = await res.json();
      render(products);
    }
    function render(products){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.title}">
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.description}</div>
            <div class="card-price">$${p.price}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }
    loadProducts();
  </script>
</body>
</html>
